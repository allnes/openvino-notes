name: Quality

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Coverage reports and gate
        shell: bash
        run: |
          ./gradlew \
            ai:testDebugUnitTest \
            app:testDebugUnitTest \
            data:testDebugUnitTest \
            domain:testDebugUnitTest \
            koverXmlReport \
            --stacktrace

      - name: Prepare coverage artifacts
        if: always()
        shell: bash
        run: bash .github/scripts/quality/prepare_coverage_artifacts.sh coverage-artifacts

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: quality-coverage-reports
          if-no-files-found: ignore
          path: coverage-artifacts

      - name: Publish coverage summary
        if: always()
        shell: bash
        run: bash .github/scripts/quality/write_coverage_summary.sh
