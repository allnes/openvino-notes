name: Quality

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  quality-foundation:
    name: Quality Foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Format, static analysis, and lint
        shell: bash
        run: bash .github/scripts/quality/run_foundation.sh

      - name: Publish lint and static analysis summary
        if: always()
        shell: bash
        run: bash .github/scripts/quality/write_foundation_summary.sh

      - name: Upload detekt SARIF for ai
        if: always() && hashFiles('ai/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai/build/reports/detekt/detekt.sarif
          category: detekt-ai

      - name: Upload detekt SARIF for app
        if: always() && hashFiles('app/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt-app

      - name: Upload detekt SARIF for data
        if: always() && hashFiles('data/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: data/build/reports/detekt/detekt.sarif
          category: detekt-data

      - name: Upload detekt SARIF for domain
        if: always() && hashFiles('domain/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: domain/build/reports/detekt/detekt.sarif
          category: detekt-domain

      - name: Upload foundation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-foundation-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/detekt/**
            **/build/reports/ktlint/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  build-quality-x86:
    name: Build Quality (x86_64)
    needs: quality-foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Debug build and unit tests
        shell: bash
        run: bash .github/scripts/quality/run_debug_build_and_unit_tests.sh

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-build-reports-x86_64
          if-no-files-found: ignore
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
            **/build/outputs/unit_test_code_coverage/**

      - name: Upload debug APK artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks-x86_64
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  build-quality-arm64:
    name: Build Quality (arm64)
    needs: quality-foundation
    runs-on: macos-15
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Debug build and unit tests
        shell: bash
        run: bash .github/scripts/quality/run_debug_build_and_unit_tests.sh

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-build-reports-arm64
          if-no-files-found: ignore
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
            **/build/outputs/unit_test_code_coverage/**

      - name: Upload debug APK artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks-arm64
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  coverage:
    name: Coverage
    needs: quality-foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Coverage reports and gate
        shell: bash
        run: bash .github/scripts/quality/run_coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-coverage-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/kover/**

      - name: Publish coverage summary
        if: always()
        shell: bash
        run: bash .github/scripts/quality/write_coverage_summary.sh
