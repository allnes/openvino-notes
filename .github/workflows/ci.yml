name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
